<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Gland & Nyon — Transport Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #1a1a1a;
  }

  /* ── Main layout ── */
  .layout {
    width: 1920px;
    height: 1080px;
    display: grid;
    grid-template-columns: 60% 40%;
    grid-template-rows: 1fr;
  }

  /* ── Panel A — Trains Gland (left, full height) ── */
  .panel-a {
    display: flex;
    flex-direction: column;
    border-right: 3px solid #e0e0e0;
    height: 1080px;
    overflow: hidden;
  }

  /* ── Right side ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    height: 1080px;
  }

  /* ── Panel B — Bateaux CGN (right top, 60%) ── */
  .panel-b {
    height: 60%;
    display: flex;
    flex-direction: column;
    border-bottom: 3px solid #e0e0e0;
    overflow: hidden;
  }

  /* ── Panel C — Alertes trafic (right bottom, 40%) ── */
  .panel-c {
    height: 40%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f9f9f9;
  }

  /* ── Panel headers ── */
  .panel-header {
    background: #ffffff;
    padding: 10px 20px 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #e0e0e0;
    flex-shrink: 0;
  }
  .panel-header.red { background: #EB0000; }

  /* ── Main header (panel A) ── */
  .main-header {
    background: #ffffff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    border-bottom: 3px solid #e0e0e0;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .sbb-logo-img { height: 28px; width: auto; display: block; }
  .header-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .station-name { font-size: 36px; font-weight: 700; color: #1a1a1a; }
  .clock { font-size: 26px; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: 2px; color: #1a1a1a; text-align: right; }
  .date-str { font-size: 10px; color: #888; margin-top: 2px; text-align: right; }

  /* ── Panel B header ── */
  .boat-header {
    background: #0079C2;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .boat-title { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; }
  .boat-subtitle { font-size: 11px; color: rgba(255,255,255,0.8); }
  .boat-clock { font-size: 11px; color: rgba(255,255,255,0.7); text-align: right; }

  /* ── Column headers ── */
  .col-headers-train {
    background: #e8e8e8;
    display: grid;
    grid-template-columns: 90px 1fr 100px 80px 100px 60px;
    padding: 7px 24px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    border-bottom: 1px solid #ccc;
    flex-shrink: 0;
  }
  .col-headers-boat {
    background: #e8f4fd;
    display: grid;
    grid-template-columns: 1fr 90px 80px 60px;
    padding: 7px 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #0079C2;
    border-bottom: 1px solid #b3d9f5;
    flex-shrink: 0;
  }

  /* ── Train rows ── */
  .trains-list {
    flex: 1;
    overflow: hidden;
    background: #ffffff;
  }
  .dep-block { border-bottom: 1px solid #ddd; }
  .dep-block:last-child { border-bottom: none; }
  .departure-row {
    display: grid;
    grid-template-columns: 90px 1fr 100px 80px 100px 60px;
    padding: 8px 24px 4px 24px;
    align-items: center;
  }
  .stops-inline {
    display: flex;
    align-items: center;
    overflow: hidden;
    padding: 0 24px 7px 122px;
    gap: 0;
  }

  .stop-chip { display: flex; align-items: center; gap: 2px; white-space: nowrap; }
  .stop-name { font-size: 10px; color: #999; }
  .stop-sep { color: #ccc; font-size: 10px; margin: 0 4px; }

  .line-icon img { height: 22px; width: auto; display: block; }
  .line-badge-fallback {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 6px; border-radius: 3px;
    font-weight: 700; font-size: 11px;
    background: #555; color: white;
  }
  .destination { font-size: 16px; font-weight: 600; padding-left: 8px; padding-right: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sched-time { font-size: 18px; font-weight: 300; font-variant-numeric: tabular-nums; }
  .countdown { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .countdown.normal { color: #aaa; }
  .countdown.soon   { color: #FF9800; }
  .countdown.now    { color: #FF3D00; }
  .status-cell { display: flex; align-items: center; gap: 4px; }
  .status-icon { width: 14px; height: 14px; }
  .status-text { font-size: 11px; font-weight: 600; }
  .status-text.on-time { color: #4CAF50; }
  .status-text.delayed { color: #FF5722; }
  .status-text.cancelled { color: #FF1744; }
  .platform { font-size: 14px; font-weight: 700; color: #333; text-align: center; }

  /* ── Boat rows ── */
  .boats-list {
    flex: 1;
    overflow: hidden;
    background: #ffffff;
  }
  .boat-row {
    display: grid;
    grid-template-columns: 1fr 90px 80px 60px;
    padding: 9px 20px;
    border-bottom: 1px solid #e8f4fd;
    align-items: center;
  }
  .boat-row:last-child { border-bottom: none; }
  .boat-dest { font-size: 15px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
  .boat-icon { font-size: 16px; }
  .boat-time { font-size: 18px; font-weight: 300; font-variant-numeric: tabular-nums; color: #1a1a1a; }
  .boat-in   { font-size: 12px; font-weight: 600; color: #aaa; font-variant-numeric: tabular-nums; }
  .boat-in.soon { color: #FF9800; }
  .boat-in.now  { color: #FF3D00; }
  .boat-track { font-size: 13px; font-weight: 700; color: #0079C2; text-align: center; }

  /* ── Panel C — Alerts ── */
  .alert-panel-header {
    background: #1a1a1a;
    padding: 10px 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alert-panel-title { font-size: 14px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: 1px; }
  .alert-panel-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; }
  .alerts-content { flex: 1; overflow: hidden; padding: 0; }
  .no-alerts {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 14px; color: #bbb; font-style: italic;
  }
  .alert-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .alert-item.alert-warning  { background: #FFF8E1; border-left: 5px solid #FF9800; }
  .alert-item.alert-critical { background: #FFEBEE; border-left: 5px solid #F44336; }
  .alert-item.alert-info     { background: #E3F2FD; border-left: 5px solid #2196F3; }
  .alert-icon-c { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .alert-head-c { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
  .alert-desc-c { font-size: 11px; color: #555; margin-top: 3px; line-height: 1.3; }

  /* ── Footer ── */
  .footer {
    padding: 4px 24px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #bbb;
    border-top: 1px solid #eee;
    flex-shrink: 0;
    background: white;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; animation: pulse 2s infinite; display: inline-block; margin-right: 5px; vertical-align: middle; }

  .loading-msg { padding: 20px; text-align: center; color: #aaa; font-size: 13px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid #ccc; border-top-color: #EB0000;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
</style>
</head>

<script>
  const ICON_BASE = 'https://icons.app.sbb.ch/icons/';
  const WORKER_URL = 'https://gland-alerts.cyrille-baptiste.workers.dev';

  // ── Clock ──
  function updateClock() {
    const n = new Date(), pad = v => String(v).padStart(2,'0');
    document.getElementById('clock').textContent = pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('dateStr').textContent=days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
  }
  setInterval(updateClock,1000); updateClock();

  // ── Helpers ──
  function tsToDate(val){
    if(val==null)return null;
    if(typeof val==='number')return new Date(val*1000);
    const d=new Date(val); return isNaN(d.getTime())?null:d;
  }
  function fmtHHMM(d){ if(!d)return'--:--'; return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  function getSchedDate(dep){
    const s=dep.stop||{};
    return tsToDate(s.departureTimestamp)||tsToDate(dep.departureTimestamp)||tsToDate(s.departure)||tsToDate(dep.departure);
  }
  function countdown(depDate){
    if(!depDate)return{text:'—',cls:'normal'};
    const diff=Math.round((depDate-Date.now())/60000);
    if(diff<0)return{text:'Left',cls:'now'};
    if(diff===0)return{text:'Now',cls:'now'};
    if(diff<=5)return{text:diff+' min',cls:'soon'};
    return{text:diff+' min',cls:'normal'};
  }
  function delayMin(stop){ if(!stop||stop.departureDelay==null)return 0; return Math.round(stop.departureDelay/60); }

  function lineIconHtml(cat,num){
    const c=(cat||'').toLowerCase(),n=(num||'').trim();
    const primary=ICON_BASE+(n?c+'-'+n:c)+'.svg';
    const fallback=ICON_BASE+c+'.svg';
    const label=(cat+' '+(num||'')).trim();
    return '<div class="line-icon"><img src="'+primary+'" onerror="if(this.src!==\''+fallback+'\'){this.src=\''+fallback+'\';}else{this.style.display=\'none\';this.nextElementSibling.style.display=\'inline-flex\';}" alt="'+label+'"><span class="line-badge-fallback" style="display:none">'+label+'</span></div>';
  }
  function statusHtml(delay,cancelled){
    if(cancelled)return'<div class="status-cell"><img class="status-icon" src="'+ICON_BASE+'cancellation.svg"><span class="status-text cancelled">Cancelled</span></div>';
    if(delay>0)return'<div class="status-cell"><img class="status-icon" src="'+ICON_BASE+'delay.svg"><span class="status-text delayed">+'+delay+'m</span></div>';
    return'<div class="status-cell"><span class="status-text on-time">On time</span></div>';
  }

  // ── Stops cache ──
  const stopsCache={};
  async function fetchStopsForDep(dep){
    const passList=dep.passList||(dep.stop&&dep.stop.passList)||null;
    if(passList&&passList.length)return passList;
    const schedDate=getSchedDate(dep); if(!schedDate)return[];
    const pad=v=>String(v).padStart(2,'0');
    const dateStr=schedDate.getFullYear()+'-'+pad(schedDate.getMonth()+1)+'-'+pad(schedDate.getDate());
    const timeStr=pad(schedDate.getHours())+pad(schedDate.getMinutes());
    try{
      const r=await fetch('https://transport.opendata.ch/v1/connections?from=Gland&to='+encodeURIComponent(dep.to)+'&date='+dateStr+'&time='+timeStr+'&limit=1');
      if(!r.ok)return[];
      const data=await r.json();
      const conn=data.connections&&data.connections[0]; if(!conn)return[];
      for(const sec of(conn.sections||[])){ if(sec.journey&&sec.journey.passList&&sec.journey.passList.length)return sec.journey.passList; }
    }catch(e){}
    return[];
  }
  function nextStopsHtml(passList){
    if(!passList||!passList.length)return'';
    const fromIdx=passList.findIndex(s=>s.station&&s.station.name&&s.station.name.toLowerCase().includes('gland'));
    const after=(fromIdx>=0?passList.slice(fromIdx+1):passList.slice(1)).filter(s=>{
      const name=(s.station&&s.station.name)||s.name||'';
      return name.trim()!==''&&name!=='?';
    });
    const shown=after.slice(0,after.length>1?Math.min(5,after.length-1):after.length);
    if(!shown.length)return'';
    return shown.map((s,i)=>{
      const name=(s.station&&s.station.name)||s.name||'';
      const sep=i<shown.length-1?'<span class="stop-sep">›</span>':'';
      return'<span class="stop-chip"><span class="stop-name">'+name+'</span></span>'+sep;
    }).join('');
  }

  // ═══════════ PANEL A — TRAINS ═══════════
  let trainsData=[];
  function refreshTrainCountdowns(){
    trainsData.forEach((dep,i)=>{
      const el=document.getElementById('tcd-'+i); if(!el)return;
      const cd=countdown(getSchedDate(dep)); el.textContent=cd.text; el.className='countdown '+cd.cls;
    });
  }
  setInterval(refreshTrainCountdowns,10000);

  async function refreshTrains(){
    try{
      Object.keys(stopsCache).forEach(k=>delete stopsCache[k]);
      const r=await fetch('https://transport.opendata.ch/v1/stationboard?station=Gland&limit=9&type=departure');
      if(!r.ok)throw new Error('HTTP '+r.status);
      const data=await r.json();
      trainsData=data.stationboard||[];
      const list=document.getElementById('trainsList');
      if(!trainsData.length){list.innerHTML='<div class="loading-msg">No departures available.</div>';return;}
      list.innerHTML=trainsData.map((dep,i)=>{
        const cat=dep.category||'?',num=dep.number||'';
        const dest=dep.to||'—';
        const schedDate=getSchedDate(dep);
        const sched=fmtHHMM(schedDate);
        const delay=delayMin(dep.stop);
        const cancelled=dep.stop&&dep.stop.cancelled;
        const plat=(dep.stop&&dep.stop.platform)?dep.stop.platform:'—';
        const cd=countdown(schedDate);
        const key=(dep.category||'')+(dep.number||'')+(dep.departure||'');
        const stopsHtml=stopsCache[key]?nextStopsHtml(stopsCache[key]):'';
        return'<div class="dep-block" id="tblock-'+i+'">'
          +'<div class="departure-row">'
          +'<div>'+lineIconHtml(cat,num)+'</div>'
          +'<div class="destination">'+dest+'</div>'
          +'<div class="sched-time">'+sched+'</div>'
          +'<div><span class="countdown '+cd.cls+'" id="tcd-'+i+'">'+cd.text+'</span></div>'
          +'<div>'+statusHtml(delay,cancelled)+'</div>'
          +'<div class="platform">'+plat+'</div>'
          +'</div>'
          +'<div class="stops-inline" id="tstops-'+i+'">'+stopsHtml+'</div>'
          +'</div>';
      }).join('');

      // Fetch stops async
      trainsData.forEach(async(dep,i)=>{
        const key=(dep.category||'')+(dep.number||'')+(dep.departure||'');
        if(!stopsCache[key]){
          const stops=await fetchStopsForDep(dep);
          stopsCache[key]=stops;
        }
        const el=document.getElementById('tstops-'+i);
        if(el)el.innerHTML=nextStopsHtml(stopsCache[key]);
      });

      const n=new Date(),pad=v=>String(v).padStart(2,'0');
      document.getElementById('lastUpdateTrain').textContent='Updated '+pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
    }catch(e){
      document.getElementById('trainsList').innerHTML='<div class="loading-msg">Cannot reach SBB API.</div>';
    }
  }

  // ═══════════ PANEL B — BATEAUX CGN ═══════════
  // Try multiple station name variants for Nyon CGN port
  const CGN_STATION_NAMES = [
    'Nyon, débarcadère',
    'Nyon, debarcadere',
    'Nyon, CGN',
    'Nyon CGN',
    'Nyon, Quai',
  ];

  async function fetchBoatDepartures() {
    // First try each station name
    for (const name of CGN_STATION_NAMES) {
      const url = 'https://transport.opendata.ch/v1/stationboard?station='+encodeURIComponent(name)+'&limit=7&type=departure';
      try {
        const r = await fetch(url);
        if (!r.ok) continue;
        const data = await r.json();
        const boats = (data.stationboard||[]).filter(d => {
          const cat = (d.category||'').toUpperCase();
          // Only keep boat/ship departures
          return cat === 'BAT' || cat === 'BOAT' || cat === 'SCHIFF' || cat.includes('BAT') ||
                 (d.name||'').toLowerCase().includes('cgn') ||
                 (d.operator||'').toLowerCase().includes('cgn') ||
                 (d.operator||'').toLowerCase().includes('navigation');
        });
        if (boats.length > 0) return { boats, stationName: data.station?.name || name };

        // Even if no boat filter match, if stationboard has results use them
        if ((data.stationboard||[]).length > 0) return { boats: data.stationboard.slice(0,7), stationName: data.station?.name || name };
      } catch(e) { continue; }
    }

    // Fallback: search for station then use its ID
    try {
      const sr = await fetch('https://transport.opendata.ch/v1/locations?query=Nyon+bateau&type=station');
      if (sr.ok) {
        const sdata = await sr.json();
        const stations = sdata.stations || [];
        const cgn = stations.find(s => {
          const n = (s.name||'').toLowerCase();
          return n.includes('debarcadere') || n.includes('débarcadère') || n.includes('cgn') || n.includes('rive');
        });
        if (cgn) {
          const r2 = await fetch('https://transport.opendata.ch/v1/stationboard?id='+cgn.id+'&limit=7&type=departure');
          if (r2.ok) {
            const d2 = await r2.json();
            return { boats: d2.stationboard||[], stationName: cgn.name };
          }
        }
        // Log what we found for debugging
        console.log('Stations found:', stations.map(s=>s.name+' ('+s.id+')').join(', '));
      }
    } catch(e) {}

    return { boats: [], stationName: null };
  }

  async function refreshBoats(){
    const list = document.getElementById('boatsList');
    try{
      const { boats, stationName } = await fetchBoatDepartures();

      if(!boats.length){
        list.innerHTML='<div class="loading-msg" style="font-size:11px;color:#aaa;">No CGN departures found.<br>Station: Nyon, débarcadère de Rive</div>';
        return;
      }

      list.innerHTML=boats.map((dep)=>{
        const dest=dep.to||'—';
        const schedDate=getSchedDate(dep);
        const sched=fmtHHMM(schedDate);
        const cd=countdown(schedDate);
        const plat=(dep.stop&&dep.stop.platform)?dep.stop.platform:'—';
        return'<div class="boat-row">'
          +'<div class="boat-dest"><span class="boat-icon">⛵</span>'+dest+'</div>'
          +'<div class="boat-time">'+sched+'</div>'
          +'<div class="boat-in '+cd.cls+'">'+cd.text+'</div>'
          +'<div class="boat-track">'+plat+'</div>'
          +'</div>';
      }).join('');

      const n=new Date(),pad=v=>String(v).padStart(2,'0');
      document.getElementById('boatUpdate').textContent='Updated '+pad(n.getHours())+':'+pad(n.getMinutes());
    }catch(e){
      list.innerHTML='<div class="loading-msg">Cannot reach CGN API.</div>';
    }
  }

  // Countdown refresh for boats
  let boatsRawData=[];
  setInterval(()=>{
    // simple re-render not needed — boats refresh every 60s
  },10000);

  // ═══════════ PANEL C — ALERTES ═══════════
  async function refreshAlerts(){
    try{
      const r=await fetch(WORKER_URL,{cache:'no-store'});
      if(!r.ok)return;
      const data=await r.json();
      const alerts=(data.alerts||[]).filter(a=>a.header&&a.header.trim()!=='');
      const content=document.getElementById('alertsContent');
      const dot=document.getElementById('alertDot');

      if(!alerts.length){
        dot.style.background='#4CAF50';
        content.innerHTML='<div class="no-alerts">No disruptions on the network</div>';
        return;
      }

      dot.style.background='#FF5722';
      content.innerHTML=alerts.slice(0,3).map(a=>{
        const cause=a.cause||'';
        const isCritical=['TECHNICAL_PROBLEM','ACCIDENT'].includes(cause);
        const isInfo=['CONSTRUCTION','MAINTENANCE'].includes(cause);
        const cls=isCritical?'alert-critical':isInfo?'alert-info':'alert-warning';
        const icon=isCritical?'🔴':isInfo?'🔧':'⚠️';
        const desc=(a.description||'').replace(/<[^>]+>/g,'');
        const shortDesc=desc.length>100?desc.substring(0,100)+'…':desc;
        return'<div class="alert-item '+cls+'">'
          +'<div class="alert-icon-c">'+icon+'</div>'
          +'<div><div class="alert-head-c">'+a.header+'</div>'
          +(shortDesc?'<div class="alert-desc-c">'+shortDesc+'</div>':'')
          +'</div></div>';
      }).join('');
    }catch(e){
      // silently fail
    }
  }

  // ═══════════ Init & timers ═══════════
  refreshTrains();
  refreshBoats();
  refreshAlerts();

  setInterval(refreshTrains, 30000);
  setInterval(refreshBoats,  30000);
  setInterval(refreshAlerts, 120000);
</script>
</body>
</html>
